name: Publish

# Trusted Publishing to PyPI and MCP Registry.
#
# Triggered by pushing a tag whose name starts with `v` (e.g. `v1.0.0`).
# The tag's `v`-stripped name MUST match the `version` field in
# pyproject.toml — the workflow asserts that before building. Authentication
# uses PyPI Trusted Publishing (OIDC) and MCP Registry OIDC — no API token
# is stored as a repository or environment secret.

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish to PyPI and MCP Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Verify tag matches pyproject version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg_version="$(grep -E '^version' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' (version '$tag') does not match pyproject.toml version '$pkg_version'."
            echo "Update pyproject.toml to '$tag' (or move the tag) and re-push before publishing."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches package version ${pkg_version}."

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          skip-existing: true

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 7
