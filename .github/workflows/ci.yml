name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check

      - name: Test
        run: uv run pytest -q

  # Single stable check to require in the branch ruleset. The matrix above emits
  # per-version contexts (test (3.11), ...) that change whenever the matrix
  # changes; this aggregate gate does not, so the required check never drifts.
  ci-gate:
    name: ci-gate
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify matrix succeeded
        run: |
          [ "${{ needs.test.result }}" = "success" ] || exit 1
